name: Build and test windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        node-version: [ 24.x ]

    steps:
      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: bin/xrf-ui/package-lock.json

      - uses: Swatinem/rust-cache@v2

      - name: Run formatter
        run: cargo fmt --all -- --check

      - name: Run xray workspace tests
        run: cargo test --verbose --workspace --lib

      - name: Build CLI
        run: cargo build -p xrf-cli --release --locked

      - name: Upload CLI build artifacts
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: xrf-cli
          path: target/release/xrf-cli.exe
          retention-days: 1

      - name: Install UI dependencies
        run: npm.cmd ci --prefix bin/xrf-ui

      - name: Build application
        working-directory: bin/xrf-app
        run: npm.cmd exec --prefix ../xrf-ui -- tauri build --ci --no-bundle

      - name: Upload application build artifacts
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: xrf-app
          path: target/release/xrf-app.exe
          retention-days: 1


  upload-nightly:
    if: ${{ github.ref_name == 'main' && github.event_name != 'pull_request' }}
    needs: [ build ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Update nightly tag
        uses: EndBug/latest-tag@latest
        id: update-nightly-tag
        with:
          ref: nightly

      - uses: actions/download-artifact@v8
        with:
          name: xrf-cli

      - name: Publish nightly cli build
        if: ${{ steps.update-nightly-tag.outcome == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload --clobber nightly xrf-cli.exe

      - uses: actions/download-artifact@v8
        with:
          name: xrf-app

      - name: Publish nightly application build
        if: ${{ steps.update-nightly-tag.outcome == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload --clobber nightly xrf-app.exe
